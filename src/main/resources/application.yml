server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_chat?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# 日志配置
logging:
  level:
    com.example.aichat: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n"

# 多模型配置
ai:
  models:
    configs:
      # === OpenAI ===
      gpt-4o-mini:
        provider: OPENAI
        api-key: ${OPENAI_API_KEY:}
        base-url: https://api.openai.com/v1
        model-name: gpt-4o-mini
        temperature: 0.7
        max-tokens: 2000

      # === 通义千问 (DashScope) ===
      qwen-plus:
        provider: OPENAI
        api-key: ${DASHSCOPE_API_KEY:}
        base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
        model-name: qwen-plus
        temperature: 0.7
        max-tokens: 2000

      # === DeepSeek (兼容OpenAI格式) ===
      deepseek-chat:
        provider: OPENAI
        api-key: ${DEEPSEEK_API_KEY:}
        base-url: https://api.deepseek.com
        model-name: deepseek-chat
        temperature: 0.7
        max-tokens: 2000

      # === Claude ===
      claude-sonnet:
        provider: CLAUDE
        base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
        api-key: ${ANTHROPIC_API_KEY:}
        model-name: ${ANTHROPIC_MODEL_NAME:claude-sonnet-4-6}
        temperature: 0.7
        max-tokens: 4096

# RAG 知识库配置 (W3)
rag:
  pgvector:
    host: ${PGVECTOR_HOST:localhost}
    port: ${PGVECTOR_PORT:5433}
    database: rag_db
    user:  ${PGVECTOR_USERNAME:postgres}
    password: ${PGVECTOR_PASSWORD:postgres}
  embedding:
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model-name: text-embedding-v3
    dimension: 1024

  chunk:
    size: 900
    overlap: 150
  hybrid:
    enabled: true          # 是否启用混合检索（向量+BM25）
    vector-weight: 0.7      # 向量检索权重
    bm25-weight: 0.3        # BM25 关键词检索权重
  rerank:
    enabled: true            # 是否启用 Rerank 重排序
    provider: cohere         # cohere | local（模力方舟兼容 cohere 格式）
    api-key: ${RERANK_API_KEY:}
    base-url: ${RERANK_BASE_URL:https://api.cohere.ai}
    model: ${RERANK_MODEL:rerank-english-v2.0}
  local-rerank:
    enabled: true            # 外部 rerank 不可用或未配置时，使用本地关键词加权重排
    keyword-boost: 0.08      # 命中规格关键词时的加分
    normal-boost: 0.03       # 命中普通查询词时的加分
    max-boost: 0.5           # 单个片段最高加分
    keywords: pmic,ldo,dcdc,dc-dc,buck,boost,电压,电流,输出,路,通道,引脚,接口,寄存器,电源,规格,最大,最小
  chat:
    history-rounds: 5          # 多轮对话历史保留轮数
    rewrite-enabled: true      # 是否启用 query 改写
  retrieval:
    provider: ${RAG_RETRIEVAL_PROVIDER:local} # local | bailian
    max-results: 8
    min-score: 0.55
  bailian:
    access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:}
    access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}
    endpoint: ${RAG_BAILIAN_ENDPOINT:bailian.cn-beijing.aliyuncs.com}
    workspace-id: ${RAG_BAILIAN_WORKSPACE_ID:${WORKSPACE_ID:}}
    index-id: ${RAG_BAILIAN_INDEX_ID:}
    dense-top-k: ${RAG_BAILIAN_DENSE_TOP_K:30}
    sparse-top-k: ${RAG_BAILIAN_SPARSE_TOP_K:30}
    enable-reranking: ${RAG_BAILIAN_ENABLE_RERANKING:true}
    enable-rewrite: ${RAG_BAILIAN_ENABLE_REWRITE:false}
    rerank-top-n: ${RAG_BAILIAN_RERANK_TOP_N:8}
    rerank-min-score: ${RAG_BAILIAN_RERANK_MIN_SCORE:0.2}
    rerank-model: ${RAG_BAILIAN_RERANK_MODEL:qwen3-rerank-hybrid}
  document:
    upload-dir: ./uploads
    max-file-size: 50MB
    allowed-types:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - text/plain
      - text/csv
      - text/markdown

# 长期记忆配置（阿里云百炼 Model Studio Memory API）
memory:
  enabled: ${DASHSCOPE_MEMORY_ENABLED:false}
  api-key: ${DASHSCOPE_API_KEY:}
  base-url: ${DASHSCOPE_MEMORY_BASE_URL:https://dashscope.aliyuncs.com/api/v2/apps/memory}
  library-id: ${DASHSCOPE_MEMORY_LIBRARY_ID:}
  top-k: ${DASHSCOPE_MEMORY_TOP_K:5}
  min-score: ${DASHSCOPE_MEMORY_MIN_SCORE:0.3}
  enable-rewrite: ${DASHSCOPE_MEMORY_ENABLE_REWRITE:false}
  enable-rerank: ${DASHSCOPE_MEMORY_ENABLE_RERANK:false}
  profile-schema-ids: ${DASHSCOPE_MEMORY_PROFILE_SCHEMA_IDS:}
  profile-write-schema-id: ${DASHSCOPE_MEMORY_PROFILE_WRITE_SCHEMA_ID:}

# Agent 工具配置 (W5)
agent:
  tools:
    web-search:
      api-key: ${SERPER_API_KEY:}
      base-url: https://google.serper.dev/search
    llm-summarize:
      model-id: ${LLM_SUMMARIZE_MODEL:deepseek-chat}
    file-writer:
      output-dir: ${FILE_WRITER_OUTPUT_DIR:./workflow-output}
