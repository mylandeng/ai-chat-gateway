server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_chat?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# 日志配置
logging:
  level:
    com.example.aichat: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n"

# 多模型配置
ai:
  models:
    configs:
      # === OpenAI ===
      gpt-4o-mini:
        provider: OPENAI
        api-key: ${OPENAI_API_KEY:}
        base-url: https://api.openai.com/v1
        model-name: gpt-4o-mini
        temperature: 0.7
        max-tokens: 2000

      # === 通义千问 (DashScope) ===
      qwen-plus:
        provider: DASHSCOPE
        api-key: ${DASHSCOPE_API_KEY:}
        model-name: qwen-plus
        temperature: 0.7
        max-tokens: 2000

      # === DeepSeek (兼容OpenAI格式) ===
      deepseek-chat:
        provider: OPENAI
        api-key: ${DEEPSEEK_API_KEY:}
        base-url: https://api.deepseek.com
        model-name: deepseek-chat
        temperature: 0.7
        max-tokens: 2000

      # === Claude ===
      claude-sonnet:
        provider: CLAUDE
        api-key: ${ANTHROPIC_API_KEY:}
        model-name: claude-haiku-4-5-20251001
        temperature: 0.7
        max-tokens: 4096

# RAG 知识库配置 (W3)
rag:
  pgvector:
    host: ${PGVECTOR_HOST:localhost}
    port: ${PGVECTOR_PORT:5433}
    database: rag_db
    user: postgres
    password: ${PGVECTOR_PASSWORD:postgres}
  embedding:
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model-name: text-embedding-v3
    dimension: 1024

  chunk:
    size: 500
    overlap: 50
  retrieval:
    max-results: 5
    min-score: 0.0
  document:
    upload-dir: ./uploads
    max-file-size: 50MB
    allowed-types:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - text/plain
      - text/csv
      - text/markdown


