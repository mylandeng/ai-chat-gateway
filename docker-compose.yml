version: '3.8'

services:
  # MySQL
  mysql:
    image: mysql:8.0
    container_name: ai-chat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: ai_chat
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ai-chat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 应用
  app:
    build: .
    container_name: ai-chat-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ai_chat?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-root123}
      SPRING_DATA_REDIS_HOST: redis
      PGVECTOR_HOST: pgvector
      PGVECTOR_PORT: 5432
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_MEMORY_ENABLED: ${DASHSCOPE_MEMORY_ENABLED:-false}
      DASHSCOPE_MEMORY_BASE_URL: ${DASHSCOPE_MEMORY_BASE_URL:-https://dashscope.aliyuncs.com/api/v2/apps/memory}
      DASHSCOPE_MEMORY_LIBRARY_ID: ${DASHSCOPE_MEMORY_LIBRARY_ID:-}
      DASHSCOPE_MEMORY_TOP_K: ${DASHSCOPE_MEMORY_TOP_K:-5}
      DASHSCOPE_MEMORY_MIN_SCORE: ${DASHSCOPE_MEMORY_MIN_SCORE:-0.3}
      DASHSCOPE_MEMORY_ENABLE_REWRITE: ${DASHSCOPE_MEMORY_ENABLE_REWRITE:-false}
      DASHSCOPE_MEMORY_ENABLE_RERANK: ${DASHSCOPE_MEMORY_ENABLE_RERANK:-false}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/models"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Nginx（前端 + 反向代理）
  nginx:
    build: ./admin-ui
    container_name: ai-chat-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

  pgvector:
    image: ankane/pgvector:latest
    container_name: ai-chat-pgvector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  pgvector_data:
