services:
  # MySQL
  mysql:
    image: mysql:8.0
    container_name: ai-chat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: ai_chat
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ai-chat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 应用
  app:
    build: .
    pull_policy: if_not_present
    container_name: ai-chat-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ai_chat?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-root123}
      SPRING_DATA_REDIS_HOST: redis
      PGVECTOR_HOST: pgvector
      PGVECTOR_PORT: 5432
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_MEMORY_ENABLED: ${DASHSCOPE_MEMORY_ENABLED:-false}
      DASHSCOPE_MEMORY_BASE_URL: ${DASHSCOPE_MEMORY_BASE_URL:-https://dashscope.aliyuncs.com/api/v2/apps/memory}
      DASHSCOPE_MEMORY_LIBRARY_ID: ${DASHSCOPE_MEMORY_LIBRARY_ID:-}
      DASHSCOPE_MEMORY_TOP_K: ${DASHSCOPE_MEMORY_TOP_K:-5}
      DASHSCOPE_MEMORY_MIN_SCORE: ${DASHSCOPE_MEMORY_MIN_SCORE:-0.3}
      DASHSCOPE_MEMORY_ENABLE_REWRITE: ${DASHSCOPE_MEMORY_ENABLE_REWRITE:-false}
      DASHSCOPE_MEMORY_ENABLE_RERANK: ${DASHSCOPE_MEMORY_ENABLE_RERANK:-false}
      DASHSCOPE_MEMORY_PROFILE_SCHEMA_IDS: ${DASHSCOPE_MEMORY_PROFILE_SCHEMA_IDS:-}
      DASHSCOPE_MEMORY_PROFILE_WRITE_SCHEMA_ID: ${DASHSCOPE_MEMORY_PROFILE_WRITE_SCHEMA_ID:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_MODEL_NAME: ${ANTHROPIC_MODEL_NAME:-}
      PGVECTOR_USERNAME: ${PGVECTOR_USERNAME:-postgres}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD:-}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-}
      RERANK_MODEL: ${RERANK_MODEL:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      LLM_SUMMARIZE_MODEL: ${LLM_SUMMARIZE_MODEL:-}
      FILE_WRITER_OUTPUT_DIR: ${FILE_WRITER_OUTPUT_DIR:-./workflow-output}
      WORKSPACE_ID: ${WORKSPACE_ID:-}
      RAG_RETRIEVAL_PROVIDER: ${RAG_RETRIEVAL_PROVIDER:-local}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      RAG_BAILIAN_WORKSPACE_ID: ${RAG_BAILIAN_WORKSPACE_ID:-}
      RAG_BAILIAN_INDEX_ID: ${RAG_BAILIAN_INDEX_ID:-}
      ALIPAY_APP_PRIVATE_KEY: ${ALIPAY_APP_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_SERVICE_ID: ${ALIPAY_SERVICE_ID:-}
      ALIPAY_AMOUNT: ${ALIPAY_AMOUNT:-0.01}
      ALIPAY_PAY_BEFORE_MINUTES: ${ALIPAY_PAY_BEFORE_MINUTES:-30}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-https://dashscope.aliyuncs.com/api/v1/mcps/alipay-ty/sse}
      MCP_AUTH_MODE: ${MCP_AUTH_MODE:-bearer}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/models"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Nginx（前端 + 反向代理）
  nginx:
    build: ./admin-ui
    pull_policy: if_not_present
    container_name: ai-chat-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

  pgvector:
    image: ankane/pgvector:latest
    container_name: ai-chat-pgvector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  pgvector_data:
